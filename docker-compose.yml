services:
  vetroscope-home-sync:
    image: ghcr.io/rankin-works/vetroscope-home-sync:latest
    container_name: vetroscope-home-sync
    restart: unless-stopped
    ports:
      - "4437:4437"
    environment:
      VS_SERVER_NAME: "Home Sync"
    volumes:
      - vetroscope-data:/data

volumes:
  vetroscope-data:
